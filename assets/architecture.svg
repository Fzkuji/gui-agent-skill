<svg width="100%" viewBox="0 0 680 860" xmlns="http://www.w3.org/2000/svg" style="font-family: system-ui, -apple-system, sans-serif;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-sm" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ???????????????????????????????????????????????
       TITLE
  ??????????????????????????????????????????????? -->
  <text x="340" y="32" text-anchor="middle" font-size="16" font-weight="600" fill="#0C447C">GUIClaw � Agent Architecture</text>
  <text x="340" y="50" text-anchor="middle" font-size="11" fill="#5F5E5A">Orchestrated by agent.py</text>

  <!-- ???????????????????????????????????????????????
       SECTION 1: MAIN PIPELINE (top, full width)
  ??????????????????????????????????????????????? -->
  <!-- Section label -->
  <text x="52" y="78" font-size="10" font-weight="600" fill="#185FA5" letter-spacing="0.08em">MAIN PIPELINE</text>

  <!-- Pipeline boxes: 7 steps, each ~78px wide, gap ~8px -->
  <!-- x positions: 40, 126, 212, 298, 384, 470, 556 -->

  <!-- 1. INTENT MATCH -->
  <rect x="40" y="85" width="78" height="40" rx="6" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.8"/>
  <text x="79" y="101" text-anchor="middle" font-size="10" font-weight="600" fill="#0C447C">Intent</text>
  <text x="79" y="115" text-anchor="middle" font-size="10" font-weight="600" fill="#0C447C">Match</text>

  <!-- 2. OBSERVE -->
  <rect x="126" y="85" width="78" height="40" rx="6" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.8"/>
  <text x="165" y="108" text-anchor="middle" font-size="10" font-weight="600" fill="#0C447C">Observe</text>

  <!-- 3. ENSURE APP READY -->
  <rect x="212" y="85" width="78" height="40" rx="6" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.8"/>
  <text x="251" y="101" text-anchor="middle" font-size="10" font-weight="600" fill="#0C447C">Ensure App</text>
  <text x="251" y="115" text-anchor="middle" font-size="10" font-weight="600" fill="#0C447C">Ready</text>

  <!-- 4. ACT -->
  <rect x="298" y="85" width="78" height="40" rx="6" fill="#185FA5" stroke="#185FA5" stroke-width="0.8"/>
  <text x="337" y="108" text-anchor="middle" font-size="10" font-weight="600" fill="#E6F1FB">Act</text>

  <!-- 5. VERIFY -->
  <rect x="384" y="85" width="78" height="40" rx="6" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.8"/>
  <text x="423" y="108" text-anchor="middle" font-size="10" font-weight="600" fill="#0C447C">Verify</text>

  <!-- 6. SAVE WORKFLOW -->
  <rect x="470" y="85" width="78" height="40" rx="6" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.8"/>
  <text x="509" y="101" text-anchor="middle" font-size="10" font-weight="600" fill="#0C447C">Save</text>
  <text x="509" y="115" text-anchor="middle" font-size="10" font-weight="600" fill="#0C447C">Workflow</text>

  <!-- 7. REPORT -->
  <rect x="556" y="85" width="78" height="40" rx="6" fill="#0C447C" stroke="#0C447C" stroke-width="0.8"/>
  <text x="595" y="108" text-anchor="middle" font-size="10" font-weight="600" fill="#E6F1FB">Report</text>

  <!-- Arrows between pipeline steps -->
  <line x1="118" y1="105" x2="126" y2="105" stroke="#378ADD" stroke-width="1.2" marker-end="url(#arrow-sm)"/>
  <line x1="204" y1="105" x2="212" y2="105" stroke="#378ADD" stroke-width="1.2" marker-end="url(#arrow-sm)"/>
  <line x1="290" y1="105" x2="298" y2="105" stroke="#378ADD" stroke-width="1.2" marker-end="url(#arrow-sm)"/>
  <line x1="376" y1="105" x2="384" y2="105" stroke="#378ADD" stroke-width="1.2" marker-end="url(#arrow-sm)"/>
  <line x1="462" y1="105" x2="470" y2="105" stroke="#378ADD" stroke-width="1.2" marker-end="url(#arrow-sm)"/>
  <line x1="548" y1="105" x2="556" y2="105" stroke="#378ADD" stroke-width="1.2" marker-end="url(#arrow-sm)"/>

  <!-- Feedback loop: verify back to observe -->
  <path d="M423 85 L423 70 L165 70 L165 85" fill="none" stroke="#378ADD" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow-sm)"/>
  <text x="294" y="66" text-anchor="middle" font-size="9" fill="#378ADD">retry loop</text>

  <!-- (removed: agent.py orchestrator bar) -->

  <!-- ???????????????????????????????????????????????
       SECTION 2: SUB-SKILLS  (middle, 5 columns)
  ??????????????????????????????????????????????? -->
  <text x="52" y="178" font-size="10" font-weight="600" fill="#0F6E56" letter-spacing="0.08em">SUB-SKILLS</text>

  <!-- 5 sub-skill boxes: each 112px wide, gap 14px -->
  <!-- Total: 5*112 + 4*14 = 560+56 = 616. Start at x=32 -->
  <!-- x: 32, 158, 284, 410, 536 -->

  <!-- gui-observe -->
  <rect x="32" y="185" width="112" height="56" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="88" y="205" text-anchor="middle" font-size="11" font-weight="600" fill="#085041">gui-observe</text>
  <text x="88" y="220" text-anchor="middle" font-size="9" fill="#0F6E56">Screen capture</text>
  <text x="88" y="232" text-anchor="middle" font-size="9" fill="#0F6E56">+ element detect</text>

  <!-- gui-learn -->
  <rect x="156" y="185" width="112" height="56" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="212" y="205" text-anchor="middle" font-size="11" font-weight="600" fill="#085041">gui-learn</text>
  <text x="212" y="220" text-anchor="middle" font-size="9" fill="#0F6E56">App profiling</text>
  <text x="212" y="232" text-anchor="middle" font-size="9" fill="#0F6E56">+ component map</text>

  <!-- gui-act -->
  <rect x="280" y="185" width="112" height="56" rx="8" fill="#1D9E75" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="336" y="205" text-anchor="middle" font-size="11" font-weight="600" fill="#E1F5EE">gui-act</text>
  <text x="336" y="220" text-anchor="middle" font-size="9" fill="#9FE1CB">Click / type /</text>
  <text x="336" y="232" text-anchor="middle" font-size="9" fill="#9FE1CB">scroll / key</text>

  <!-- gui-workflow -->
  <rect x="404" y="185" width="112" height="56" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="460" y="205" text-anchor="middle" font-size="11" font-weight="600" fill="#085041">gui-workflow</text>
  <text x="460" y="220" text-anchor="middle" font-size="9" fill="#0F6E56">Record, replay</text>
  <text x="460" y="232" text-anchor="middle" font-size="9" fill="#0F6E56">+ generalize</text>

  <!-- gui-setup -->
  <rect x="528" y="185" width="112" height="56" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="584" y="205" text-anchor="middle" font-size="11" font-weight="600" fill="#085041">gui-setup</text>
  <text x="584" y="220" text-anchor="middle" font-size="9" fill="#0F6E56">Launch / close</text>
  <text x="584" y="232" text-anchor="middle" font-size="9" fill="#0F6E56">+ app lifecycle</text>

  <!-- Arrows from pipeline to sub-skills -->
  <!-- Observe ? gui-observe -->
  <line x1="165" y1="125" x2="88" y2="185" stroke="#1D9E75" stroke-width="0.8" stroke-dasharray="3 3" marker-end="url(#arrow-sm)"/>
  <!-- Observe ? gui-learn -->
  <line x1="165" y1="125" x2="212" y2="185" stroke="#1D9E75" stroke-width="0.8" stroke-dasharray="3 3" marker-end="url(#arrow-sm)"/>
  <!-- Act ? gui-act -->
  <line x1="337" y1="125" x2="336" y2="185" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arrow-sm)"/>
  <!-- Save Workflow ? gui-workflow -->
  <line x1="509" y1="125" x2="460" y2="185" stroke="#1D9E75" stroke-width="0.8" stroke-dasharray="3 3" marker-end="url(#arrow-sm)"/>
  <!-- Ensure App Ready ? gui-setup -->
  <line x1="251" y1="125" x2="584" y2="185" stroke="#1D9E75" stroke-width="0.8" stroke-dasharray="3 3" marker-end="url(#arrow-sm)"/>

  <!-- ???????????????????????????????????????????????
       SECTION 3: DETECTION STACK  (bottom-left)
  ??????????????????????????????????????????????? -->
  <text x="52" y="270" font-size="10" font-weight="600" fill="#533AB7" letter-spacing="0.08em">DETECTION STACK</text>

  <!-- Stacked vertically under gui-observe zone, x=32..230 -->
  <!-- Template Match -->
  <rect x="32" y="278" width="198" height="38" rx="6" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.8"/>
  <text x="131" y="293" text-anchor="middle" font-size="11" font-weight="600" fill="#3C3489">1. Template Match</text>
  <text x="131" y="308" text-anchor="middle" font-size="9" fill="#534AB7">Fast pixel-level matching</text>

  <!-- OCR -->
  <rect x="32" y="324" width="198" height="38" rx="6" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.8"/>
  <text x="131" y="339" text-anchor="middle" font-size="11" font-weight="600" fill="#3C3489">2. OCR</text>
  <text x="131" y="354" text-anchor="middle" font-size="9" fill="#534AB7">Text extraction from screen</text>

  <!-- YOLO -->
  <rect x="32" y="370" width="198" height="38" rx="6" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.8"/>
  <text x="131" y="385" text-anchor="middle" font-size="11" font-weight="600" fill="#3C3489">3. YOLO</text>
  <text x="131" y="400" text-anchor="middle" font-size="9" fill="#534AB7">UI element detection (CV)</text>

  <!-- LLM -->
  <rect x="32" y="416" width="198" height="38" rx="6" fill="#7F77DD" stroke="#534AB7" stroke-width="0.8"/>
  <text x="131" y="431" text-anchor="middle" font-size="11" font-weight="600" fill="#EEEDFE">4. LLM Fallback</text>
  <text x="131" y="446" text-anchor="middle" font-size="9" fill="#CECBF6">Semantic understanding</text>

  <!-- Arrows in detection stack (cascade) -->
  <line x1="131" y1="316" x2="131" y2="324" stroke="#7F77DD" stroke-width="1" marker-end="url(#arrow-sm)"/>
  <line x1="131" y1="362" x2="131" y2="370" stroke="#7F77DD" stroke-width="1" marker-end="url(#arrow-sm)"/>
  <line x1="131" y1="408" x2="131" y2="416" stroke="#7F77DD" stroke-width="1" marker-end="url(#arrow-sm)"/>

  <!-- Label: fallback cascade -->
  <text x="238" y="363" font-size="9" fill="#7F77DD">fallback</text>
  <text x="238" y="374" font-size="9" fill="#7F77DD">cascade</text>

  <!-- Connector: gui-observe ? detection stack -->
  <line x1="88" y1="241" x2="88" y2="278" stroke="#7F77DD" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrow-sm)"/>
  <line x1="88" y1="267" x2="131" y2="278" stroke="#7F77DD" stroke-width="1" marker-end="url(#arrow-sm)"/>

  <!-- ???????????????????????????????????????????????
       SECTION 4: MEMORY SYSTEM  (bottom-right)
  ??????????????????????????????????????????????? -->
  <text x="270" y="270" font-size="10" font-weight="600" fill="#854F0B" letter-spacing="0.08em">MEMORY SYSTEM</text>

