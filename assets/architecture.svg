  <rect x="272" y="296" width="164" height="64" rx="8" fill="#FAC775" stroke="#BA7517" stroke-width="0.7"/>
  <text x="354" y="316" text-anchor="middle" font-size="11" font-weight="600" fill="#412402">App Profiles</text>
  <text x="354" y="331" text-anchor="middle" font-size="9" fill="#633806">App name, version</text>
  <text x="354" y="344" text-anchor="middle" font-size="9" fill="#633806">launch args, settings</text>

  <!-- Components -->
  <rect x="454" y="296" width="174" height="64" rx="8" fill="#FAC775" stroke="#BA7517" stroke-width="0.7"/>
  <text x="541" y="316" text-anchor="middle" font-size="11" font-weight="600" fill="#412402">Components</text>
  <text x="541" y="331" text-anchor="middle" font-size="9" fill="#633806">Buttons, inputs,</text>
  <text x="541" y="344" text-anchor="middle" font-size="9" fill="#633806">menus, templates</text>

  <!-- Workflows -->
  <rect x="272" y="372" width="164" height="64" rx="8" fill="#FAC775" stroke="#BA7517" stroke-width="0.7"/>
  <text x="354" y="392" text-anchor="middle" font-size="11" font-weight="600" fill="#412402">Workflows</text>
  <text x="354" y="407" text-anchor="middle" font-size="9" fill="#633806">Step sequences</text>
  <text x="354" y="420" text-anchor="middle" font-size="9" fill="#633806">for known tasks</text>

  <!-- Meta-workflows -->
  <rect x="454" y="372" width="174" height="64" rx="8" fill="#EF9F27" stroke="#854F0B" stroke-width="0.7"/>
  <text x="541" y="392" text-anchor="middle" font-size="11" font-weight="600" fill="#FAEEDA">Meta-workflows</text>
  <text x="541" y="407" text-anchor="middle" font-size="9" fill="#FAC775">Generalized multi-app</text>
  <text x="541" y="420" text-anchor="middle" font-size="9" fill="#FAC775">workflow templates</text>

  <!-- Connectors within memory -->
  <line x1="436" y1="328" x2="454" y2="328" stroke="#BA7517" stroke-width="0.8" marker-end="url(#arrow-sm)"/>
  <line x1="354" y1="360" x2="354" y2="372" stroke="#BA7517" stroke-width="0.8" marker-end="url(#arrow-sm)"/>
  <line x1="541" y1="360" x2="541" y2="372" stroke="#BA7517" stroke-width="0.8" marker-end="url(#arrow-sm)"/>
  <line x1="436" y1="404" x2="454" y2="404" stroke="#BA7517" stroke-width="0.8" marker-end="url(#arrow-sm)"/>

  <!-- Connector from gui-learn to memory system -->
  <line x1="212" y1="241" x2="340" y2="278" stroke="#EF9F27" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrow-sm)"/>

  <!-- Connector from gui-workflow to memory system -->
  <line x1="460" y1="241" x2="460" y2="278" stroke="#EF9F27" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#arrow-sm)"/>

  <!-- ???????????????????????????????????????????????
       SECTION 5: AGENT.PY ORCHESTRATOR (center bottom)
  ??????????????????????????????????????????????? -->
  <rect x="190" y="480" width="300" height="52" rx="10" fill="#042C53" stroke="#185FA5" stroke-width="1"/>
  <text x="340" y="500" text-anchor="middle" font-size="13" font-weight="600" fill="#B5D4F4">agent.py</text>
  <text x="340" y="517" text-anchor="middle" font-size="10" fill="#85B7EB">Central orchestrator � plans � retries � logs</text>

  <!-- Arrows from agent.py upward into pipeline (bidirectional feel) -->
  <line x1="340" y1="480" x2="340" y2="152" stroke="#185FA5" stroke-width="1" stroke-dasharray="5 4" marker-end="url(#arrow-sm)"/>

  <!-- Arrows from agent.py to sub-skills row -->
  <line x1="260" y1="506" x2="130" y2="462" stroke="#185FA5" stroke-width="0.8" stroke-dasharray="3 3" marker-end="url(#arrow-sm)"/>
  <line x1="420" y1="506" x2="540" y2="462" stroke="#185FA5" stroke-width="0.8" stroke-dasharray="3 3" marker-end="url(#arrow-sm)"/>

  <!-- Arrows from agent.py to detection + memory -->
  <line x1="220" y1="516" x2="148" y2="462" stroke="#7F77DD" stroke-width="0.8" stroke-dasharray="3 3" marker-end="url(#arrow-sm)"/>
  <line x1="430" y1="516" x2="450" y2="462" stroke="#EF9F27" stroke-width="0.8" stroke-dasharray="3 3" marker-end="url(#arrow-sm)"/>

  <!-- ???????????????????????????????????????????????
       SECTION 6: INPUT / OUTPUT (very bottom)
  ??????????????????????????????????????????????? -->
  <!-- User Intent (input) -->
  <rect x="32" y="558" width="148" height="38" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.8"/>
  <text x="106" y="574" text-anchor="middle" font-size="11" font-weight="500" fill="#2C2C2A">User Intent</text>
  <text x="106" y="589" text-anchor="middle" font-size="9" fill="#5F5E5A">Natural language task</text>

  <!-- OS / Screen (input/env) -->
  <rect x="196" y="558" width="148" height="38" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.8"/>
  <text x="270" y="574" text-anchor="middle" font-size="11" font-weight="500" fill="#2C2C2A">OS / Screen</text>
  <text x="270" y="589" text-anchor="middle" font-size="9" fill="#5F5E5A">Live desktop state</text>

  <!-- Task Result (output) -->
  <rect x="360" y="558" width="148" height="38" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.8"/>
  <text x="434" y="574" text-anchor="middle" font-size="11" font-weight="500" fill="#2C2C2A">Task Result</text>
  <text x="434" y="589" text-anchor="middle" font-size="9" fill="#5F5E5A">Success + report</text>

  <!-- Saved Knowledge (output) -->
  <rect x="524" y="558" width="148" height="38" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.8"/>
  <text x="598" y="574" text-anchor="middle" font-size="11" font-weight="500" fill="#2C2C2A">Saved Knowledge</text>
  <text x="598" y="589" text-anchor="middle" font-size="9" fill="#5F5E5A">Profiles + workflows</text>

  <!-- Arrows from inputs to agent.py -->
  <line x1="106" y1="558" x2="240" y2="532" stroke="#888780" stroke-width="1" marker-end="url(#arrow-sm)"/>
  <line x1="270" y1="558" x2="300" y2="532" stroke="#888780" stroke-width="1" marker-end="url(#arrow-sm)"/>

  <!-- Arrows from agent.py to outputs -->
  <line x1="400" y1="532" x2="434" y2="558" stroke="#888780" stroke-width="1" marker-end="url(#arrow-sm)"/>
  <line x1="440" y1="532" x2="560" y2="558" stroke="#888780" stroke-width="1" marker-end="url(#arrow-sm)"/>

  <!-- ???????????????????????????????????????????????
       LEGEND
  ??????????????????????????????????????????????? -->
  <rect x="32" y="618" width="616" height="28" rx="6" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
  <rect x="50" y="628" width="10" height="8" rx="2" fill="#185FA5"/>
  <text x="65" y="636" font-size="9" fill="#444441">Pipeline</text>
  <rect x="130" y="628" width="10" height="8" rx="2" fill="#1D9E75"/>
  <text x="145" y="636" font-size="9" fill="#444441">Sub-skills</text>
  <rect x="218" y="628" width="10" height="8" rx="2" fill="#7F77DD"/>
  <text x="233" y="636" font-size="9" fill="#444441">Detection stack</text>
  <rect x="336" y="628" width="10" height="8" rx="2" fill="#EF9F27"/>
  <text x="351" y="636" font-size="9" fill="#444441">Memory</text>
  <rect x="415" y="628" width="10" height="8" rx="2" fill="#042C53"/>
  <text x="430" y="636" font-size="9" fill="#444441">Orchestrator</text>
  <rect x="516" y="628" width="10" height="8" rx="2" fill="#888780"/>
  <text x="531" y="636" font-size="9" fill="#444441">I/O</text>

