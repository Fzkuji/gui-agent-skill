# Scene: WeChat
# All automation for WeChat desktop app (macOS)
#
# Interface:
#   send_message(contact, message) → message sent
#   read_messages(contact?) → visible messages
#   scroll_history(contact?, pages?) → older messages
#
# Dependencies:
#   - apps/wechat.json (UI layout config)
#   - scenes/_actions.yaml (atomic operations)
#
# Shortcuts (gui_agent.py):
#   send_message:   task send_message --app WeChat --param contact="X" --param message="Y"
#   read_messages:  task read_messages --app WeChat --param contact="X"
#   scroll_history: task scroll_history --app WeChat --param contact="X" --param pages="3"

scene: wechat
app: WeChat
profile: apps/wechat.json

exports:
  send_message:
    params: { contact: "Contact name", message: "Text to send" }
    output: "Message sent (verified by OCR)"

  read_messages:
    params: { contact: "Contact name (optional)" }
    output: "Visible message text"

  scroll_history:
    params: { contact: "Contact name (optional)", pages: "Number of pages (default 3)" }
    output: "Collected text from each page"

# === Internal Implementation ===
meta_actions:

  navigate_to_contact:
    desc: "Open a contact's chat window"
    strategy:
      - try: "OCR find contact in sidebar (x < 430)"
        on_success: "click → chat opens"
        on_fail: "search"
      - try: "Click search_bar template → paste contact name → wait 1s"
        then: "OCR find contact in results (skip y<220, skip Q-prefix)"
        on_fail: "contact not found"
    lessons:
      - "Do NOT use Cmd+F — opens '搜一搜' (web search), not contact search"
      - "Re-clicking already-highlighted chat is a no-op — click another chat first, then back"
      - "Search results: first match is often the search box text itself, skip it"
      - "Search suggestion items start with 'Q ' prefix — skip those"

  find_input_field:
    desc: "Click the message input field"
    method: "window_calc"
    calc: "window_x + sidebar_width + (window_w - sidebar_width) / 2, window_y + window_h - 80"
    why: "OCR cannot see the placeholder text (too faint), template unreliable across states"

  send:
    key: "return"
    note: "Enter sends, NOT Cmd+Enter"

  verify_sent:
    desc: "Confirm message appeared in chat"
    method: "OCR spot check"
    region: "main area (x > sidebar_width)"
    check: "First 10 chars of message visible"

# === UI Layout Reference (from apps/wechat.json) ===
layout:
  sidebar_width: 250
  sidebar_x_max: 430
  input_bottom_offset: 80

# === Quirks ===
quirks:
  accessibility: "Essentially useless (5 elements). Use OCR + templates."
  input_placeholder: "OCR can't see it — too faint. Use window_calc positioning."
  cmd_f: "Opens web search engine, not contact search. Never use."
  selected_chat: "Clicking already-selected chat doesn't reopen. Click away first."
  encoding: "Always set LANG=en_US.UTF-8 before paste. CJK garbles without it."
  search_bar: "Template 'search_bar' available, but search flow fragile. Prefer sidebar click."
  scrolling: "Page Up works in chat area. End key returns to bottom."
